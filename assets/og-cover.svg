<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d16"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5be0ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#5be0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5be0ff"/>
      <stop offset="1" stop-color="#3b7fff"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="1000" cy="80" rx="520" ry="380" fill="url(#orb)"/>

  <!-- brand row -->
  <g transform="translate(80,86)">
    <path d="M14 0 L26 7 L26 21 L14 28 L2 21 L2 7 Z" fill="url(#hex)"/>
    <text x="44" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700"
      letter-spacing="3" fill="#eef2f7">CATALYST APPLIED AI</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700"
    letter-spacing="4" fill="#5be0ff">GOVERNED · AUDITABLE AI</text>

  <!-- headline -->
  <text x="78" y="350" font-family="Georgia, Times New Roman, serif" font-size="76" fill="#eef2f7">AI that runs</text>
  <text x="78" y="436" font-family="Georgia, Times New Roman, serif" font-size="76" font-style="italic"
    fill="#5be0ff">where your data lives.</text>

  <!-- subline -->
  <text x="80" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#7a90a8">Deployed inside your
    environment — air-gapped to cloud. Every output cited and logged.</text>

  <!-- footer chips -->
  <text x="80" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600"
    letter-spacing="1" fill="#7a90a8">Secure RAG · SafeGuard · FedRAMP 20x · NVIDIA Inception Member</text>
</svg>
